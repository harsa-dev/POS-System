openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: retail
    description: Retail mode operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /retail/products:
    get:
      operationId: retailListProducts
      tags: [retail]
      summary: List retail products
      description: Returns business-scoped Retail products for catalog and cashier workspaces.
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: stockStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RetailStockStatus"
      responses:
        "200":
          description: Retail products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailProductListResponse"
  /retail/shared-dashboard/{dashboardId}:
    get:
      operationId: retailGetSharedDashboard
      tags: [retail]
      summary: Get Retail shared dashboard summary
      description: Returns Retail-specific summary data for a shared dashboard surface.
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RetailSharedDashboardId"
      responses:
        "200":
          description: Retail shared dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailSharedDashboardResponse"
  /retail/sales/checkout:
    post:
      operationId: retailCheckoutSale
      tags: [retail]
      summary: Checkout Retail sale
      description: Persists a Retail sale transaction when preview validation passes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailSaleCheckoutInput"
      responses:
        "201":
          description: Retail sale persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailCheckoutResponse"
        "409":
          description: Retail checkout blocked by validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailCheckoutResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RetailStockStatus:
      type: string
      enum:
        - in-stock
        - low-stock
        - out-of-stock
    RetailPaymentMethod:
      type: string
      enum:
        - cash
        - qris
        - card
        - transfer
    RetailSharedDashboardId:
      type: string
      enum:
        - overview
        - sales
        - customers
        - inventory
        - cashflow
        - financial-reports
        - invoice-generator
        - shift-reports
        - team-management
        - employee-performance
        - approvals
        - audit-controls
        - roster-overview
        - employee-attendance
        - employee-contracts
        - payroll
    RetailProduct:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        barcode:
          type: string
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        unit:
          type: string
        price:
          type: number
        cost:
          type: number
        taxRatePercent:
          type: number
        currentStock:
          type: number
        reorderPoint:
          type: number
        shelfLocation:
          type: string
        supplierId:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/RetailStockStatus"
      required:
        - id
        - sku
        - barcode
        - name
        - brand
        - category
        - unit
        - price
        - cost
        - taxRatePercent
        - currentStock
        - reorderPoint
        - shelfLocation
        - supplierId
        - status
    RetailSaleLineInput:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: number
        discountPercent:
          type: number
      required:
        - productId
        - quantity
        - discountPercent
    RetailSaleCheckoutInput:
      type: object
      properties:
        paymentMethod:
          $ref: "#/components/schemas/RetailPaymentMethod"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/RetailSaleLineInput"
      required:
        - paymentMethod
        - lines
    RetailCheckoutResult:
      type: object
      properties:
        persisted:
          type: boolean
        canCheckout:
          type: boolean
        receiptNumber:
          type: string
        saleId:
          type: string
        paymentId:
          type: string
        payableTotal:
          type: number
        blockedReasons:
          type: array
          items:
            type: string
      required:
        - persisted
        - canCheckout
        - payableTotal
        - blockedReasons
    RetailSharedDashboardMetric:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        helper:
          type: string
      required:
        - label
        - value
    RetailSharedDashboardRow:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        tone:
          type: string
      required:
        - label
        - value
    RetailSharedDashboard:
      type: object
      properties:
        dashboardId:
          $ref: "#/components/schemas/RetailSharedDashboardId"
        title:
          type: string
        subtitle:
          type: string
        mode:
          type: string
          enum:
            - retail
        source:
          type: string
        status:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/RetailSharedDashboardMetric"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/RetailSharedDashboardRow"
        actions:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string
      required:
        - dashboardId
        - title
        - subtitle
        - mode
        - source
        - status
        - metrics
        - rows
        - actions
        - notes
    RetailProductListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/RetailProduct"
        message:
          type: string
      required:
        - success
        - data
    RetailCheckoutResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/RetailCheckoutResult"
        message:
          type: string
      required:
        - success
        - data
    RetailSharedDashboardResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/RetailSharedDashboard"
        message:
          type: string
      required:
        - success
        - data
