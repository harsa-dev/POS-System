openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: retail
    description: Retail mode operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /retail/dashboard:
    get:
      operationId: retailGetDashboard
      tags: [retail]
      summary: Get Retail dashboard
      responses:
        "200":
          description: Retail dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailDashboardResponse"
  /retail/products:
    get:
      operationId: retailListProducts
      tags: [retail]
      summary: List Retail products
      parameters:
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: stockStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RetailStockStatus"
      responses:
        "200":
          description: Retail products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailProductListResponse"
  /retail/barcode/{code}:
    get:
      operationId: retailLookupBarcode
      tags: [retail]
      summary: Lookup Retail product by barcode or SKU
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Retail barcode lookup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailBarcodeLookupResponse"
  /retail/inventory/risks:
    get:
      operationId: retailGetInventoryRisks
      tags: [retail]
      summary: Get Retail inventory risks
      responses:
        "200":
          description: Retail inventory risks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailInventoryRisksResponse"
  /retail/receiving:
    get:
      operationId: retailGetReceivingQueue
      tags: [retail]
      summary: Get Retail receiving queue
      responses:
        "200":
          description: Retail receiving queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReceivingQueueResponse"
  /retail/receiving/{id}/status:
    patch:
      operationId: retailUpdateReceivingStatus
      tags: [retail]
      summary: Update Retail receiving status with guarded workflow transition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailReceivingStatusUpdateInput"
      responses:
        "200":
          description: Retail receiving status updated or already set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReceivingStatusUpdateResponse"
        "409":
          description: Retail receiving status transition rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReceivingStatusUpdateResponse"
  /retail/shared-dashboard/{dashboardId}:
    get:
      operationId: retailGetSharedDashboard
      tags: [retail]
      summary: Get Retail shared dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RetailSharedDashboardId"
      responses:
        "200":
          description: Retail shared dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailSharedDashboardResponse"
  /retail/sales/preview:
    post:
      operationId: retailPreviewSale
      tags: [retail]
      summary: Preview Retail sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailSalePreviewInput"
      responses:
        "200":
          description: Retail sale preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailSalePreviewResponse"
  /retail/sales/checkout:
    post:
      operationId: retailCheckoutSale
      tags: [retail]
      summary: Checkout Retail sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailSaleCheckoutInput"
      responses:
        "201":
          description: Retail sale persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailCheckoutResponse"
        "409":
          description: Retail sale rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailCheckoutResponse"
  /retail/returns/preview:
    post:
      operationId: retailPreviewReturn
      tags: [retail]
      summary: Preview Retail return and refund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailReturnInput"
      responses:
        "200":
          description: Retail return preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReturnResponse"
  /retail/returns:
    post:
      operationId: retailPersistReturn
      tags: [retail]
      summary: Persist Retail return, refund cashflow, and restockable stock movements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetailReturnInput"
      responses:
        "201":
          description: Retail return persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReturnResponse"
        "409":
          description: Retail return requires review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailReturnResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    RetailStockStatus:
      type: string
      enum: [in-stock, low-stock, out-of-stock]
    RetailPaymentMethod:
      type: string
      enum: [cash, qris, card, transfer]
    RetailReturnReason:
      type: string
      enum: [damaged, wrong-item, customer-changed-mind, expired, other]
    RetailReceivingStatus:
      type: string
      enum: [draft, ordered, partial, received]
    RetailSharedDashboardId:
      type: string
      enum: [overview, sales, customers, inventory, cashflow, financial-reports, invoice-generator, shift-reports, team-management, employee-performance, approvals, audit-controls, roster-overview, employee-attendance, employee-contracts, payroll]
    RetailProduct:
      type: object
      additionalProperties: true
    RetailLineInput:
      type: object
      properties:
        productId: { type: string }
        quantity: { type: number }
        discountPercent: { type: number }
      required: [productId, quantity]
    RetailSalePreviewInput:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/RetailLineInput"
        paymentMethod:
          $ref: "#/components/schemas/RetailPaymentMethod"
      required: [lines]
    RetailSaleCheckoutInput:
      type: object
      properties:
        paymentMethod:
          $ref: "#/components/schemas/RetailPaymentMethod"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/RetailLineInput"
      required: [paymentMethod, lines]
    RetailReturnInput:
      type: object
      properties:
        originalReceiptNumber: { type: string }
        reason:
          $ref: "#/components/schemas/RetailReturnReason"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/RetailLineInput"
      required: [reason, lines]
    RetailReceivingStatusUpdateInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/RetailReceivingStatus"
      required: [status]
    RetailObject:
      type: object
      additionalProperties: true
    RetailArray:
      type: array
      items:
        $ref: "#/components/schemas/RetailObject"
    RetailProductListResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items:
            $ref: "#/components/schemas/RetailProduct"
        message: { type: string }
      required: [success, data]
    RetailDashboardResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailSalePreviewResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailCheckoutResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailReturnResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailBarcodeLookupResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailInventoryRisksResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailArray"
        message: { type: string }
      required: [success, data]
    RetailReceivingQueueResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailArray"
        message: { type: string }
      required: [success, data]
    RetailReceivingStatusUpdateResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
    RetailSharedDashboardResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          $ref: "#/components/schemas/RetailObject"
        message: { type: string }
      required: [success, data]
