name: Retail scoped check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  retail-check:
    name: Retail business mode gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Retail scoped check
        run: pnpm retail:check
